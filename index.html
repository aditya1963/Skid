<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAI Skid Parts List</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: #1e293b;
            color: white;
            padding: 24px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .header .company {
            font-size: 14px;
            opacity: 0.8;
        }

        .action-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 18px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .action-btn {
            appearance: none;
            border: none;
            background: #1e293b;
            color: white;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        .action-btn.secondary {
            background: #6366f1;
        }

        .copy-status {
            width: 100%;
            text-align: center;
            font-size: 13px;
            color: #16a34a;
            font-weight: 600;
            display: none;
        }
        
        .skid-id {
            background: #f8fafc;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .skid-id-value {
            font-family: "Courier New", monospace;
            font-size: 28px;
            font-weight: bold;
            color: #1e293b;
            background: white;
            padding: 12px 24px;
            border-radius: 8px;
            border: 2px solid #1e293b;
            display: inline-block;
        }
        
        .info-section {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .info-item {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
        }
        
        .info-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .info-value {
            font-size: 16px;
            color: #1e293b;
            font-weight: 500;
        }
        
        .parts-section {
            padding: 20px;
        }
        
        .parts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .parts-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
        }
        
        .parts-count {
            background: #6366f1;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .parts-list {
            background: #f8fafc;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .part-item {
            padding: 14px 16px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        
        .part-item:last-child {
            border-bottom: none;
        }
        
        .part-number-badge {
            background: #1e293b;
            color: white;
            min-width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .part-details {
            flex: 1;
        }
        
        .part-name {
            font-weight: 600;
            color: #1e293b;
            font-size: 15px;
            margin-bottom: 4px;
        }
        
        .part-desc {
            font-size: 13px;
            color: #64748b;
        }
        
        .part-qty {
            background: #dbeafe;
            color: #1d4ed8;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .footer {
            background: #f8fafc;
            padding: 16px;
            text-align: center;
            border-top: 1px solid #e2e8f0;
        }
        
        .footer-text {
            font-size: 12px;
            color: #64748b;
        }
        
        .error-container {
            padding: 60px 20px;
            text-align: center;
        }
        
        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .error-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }
        
        .error-message {
            color: #64748b;
            font-size: 14px;
        }
        
        .loading {
            padding: 60px 20px;
            text-align: center;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
            
            .skid-id-value {
                font-size: 22px;
                padding: 10px 16px;
            }

            .action-bar {
                flex-direction: column;
            }

            .action-btn {
                width: 100%;
            }
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .container {
                box-shadow: none;
                border-radius: 0;
                max-width: 100%;
            }

            .action-bar {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="content">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>Loading skid information...</p>
        </div>
    </div>

    <script>
        let currentData = null;

        function decodeData() {
            const urlParams = new URLSearchParams(window.location.search);
            const encodedData = urlParams.get('data');
            
            console.log('Raw URL:', window.location.href);
            console.log('Encoded data param:', encodedData ? encodedData.substring(0, 100) + '...' : 'null');
            
            if (!encodedData) {
                showError('No Data Found', 'This page requires a valid QR code scan to display skid information. No "data" parameter found in URL.');
                return null;
            }
            
            try {
                let base64 = encodedData
                    .replace(/-/g, '+')
                    .replace(/_/g, '/');

                while (base64.length % 4) {
                    base64 += '=';
                }

                console.log('Base64 after conversion (first 100 chars):', base64.substring(0, 100));
                
                const decoded = atob(base64);
                console.log('Decoded string (first 200 chars):', decoded.substring(0, 200));
                
                const jsonStr = decodeURIComponent(escape(decoded));
                console.log('JSON string (first 200 chars):', jsonStr.substring(0, 200));
                
                const data = JSON.parse(jsonStr);
                console.log('Parsed data:', data);
                return data;
            } catch (e) {
                console.error('Decode error:', e);
                console.error('encodedData length:', encodedData.length);
                showError('Invalid Data', 'The QR code data could not be read. Error: ' + e.message + '. Data length: ' + encodedData.length);
                return null;
            }
        }
        
        function showError(title, message) {
            document.getElementById('content').innerHTML = `
                <div class="header">
                    <div class="company">SAI Advanced Power Solutions</div>
                    <h1>Skid Parts List</h1>
                </div>
                <div class="error-container">
                    <div class="error-icon">⚠️</div>
                    <div class="error-title">${title}</div>
                    <div class="error-message">${message}</div>
                </div>
                <div class="footer">
                    <div class="footer-text">SAI Advanced Power Solutions</div>
                </div>
            `;
        }

        function csvEscape(value) {
            const str = String(value ?? '');
            return `"${str.replace(/"/g, '""')}"`;
        }

        function buildCSV(data) {
            const skidId = data.s || '';
            const date = data.d || '';
            const from = data.f || '';
            const to = data.t || '';
            const jobNum = data.j || '';
            const releaseNum = data.r || '';
            const parts = Array.isArray(data.p) ? data.p : [];

            const header = [
                'Skid ID',
                'Date',
                'Ship From',
                'Ship To',
                'Job Number',
                'Release Number',
                'Part Number',
                'Part Description',
                'Quantity'
            ];

            const rows = [header];

            if (parts.length === 0) {
                rows.push([
                    skidId,
                    date,
                    from,
                    to,
                    jobNum,
                    releaseNum,
                    '',
                    '',
                    ''
                ]);
            } else {
                parts.forEach(part => {
                    rows.push([
                        skidId,
                        date,
                        from,
                        to,
                        jobNum,
                        releaseNum,
                        part.n || '',
                        part.desc || '',
                        part.q || 0
                    ]);
                });
            }

            return rows
                .map(row => row.map(csvEscape).join(','))
                .join('\n');
        }

        async function copyCSV() {
            if (!currentData) return;

            const csvText = buildCSV(currentData);
            const statusEl = document.getElementById('copyStatus');

            try {
                await navigator.clipboard.writeText(csvText);
                if (statusEl) {
                    statusEl.textContent = 'CSV copied to clipboard';
                    statusEl.style.display = 'block';
                    setTimeout(() => {
                        statusEl.style.display = 'none';
                    }, 2500);
                }
            } catch (err) {
                console.error('Clipboard copy failed:', err);

                const textArea = document.createElement('textarea');
                textArea.value = csvText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);

                if (statusEl) {
                    statusEl.textContent = 'CSV copied to clipboard';
                    statusEl.style.display = 'block';
                    setTimeout(() => {
                        statusEl.style.display = 'none';
                    }, 2500);
                }
            }
        }

        function printPage() {
            window.print();
        }
        
        function renderSkidInfo(data) {
            currentData = data;

            const skidId = data.s || 'Unknown';
            const date = data.d || '-';
            const from = data.f || '-';
            const to = data.t || '-';
            const jobNum = data.j || '';
            const releaseNum = data.r || '';
            const parts = data.p || [];
            
            let partsHTML = '';
            parts.forEach((part, idx) => {
                const partName = part.n || 'Unknown Part';
                const qty = part.q || 0;
                const desc = part.desc || '';
                
                partsHTML += `
                    <div class="part-item">
                        <div class="part-number-badge">${idx + 1}</div>
                        <div class="part-details">
                            <div class="part-name">${escapeHtml(partName)}</div>
                            ${desc ? `<div class="part-desc">${escapeHtml(desc)}</div>` : ''}
                        </div>
                        <div class="part-qty">Qty: ${escapeHtml(String(qty))}</div>
                    </div>
                `;
            });
            
            let infoHTML = `
                <div class="info-item">
                    <div class="info-label">Date</div>
                    <div class="info-value">${escapeHtml(date)}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Ship From</div>
                    <div class="info-value">${escapeHtml(from)}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Ship To</div>
                    <div class="info-value">${escapeHtml(to)}</div>
                </div>
            `;
            
            if (jobNum) {
                infoHTML += `
                    <div class="info-item">
                        <div class="info-label">Job Number</div>
                        <div class="info-value">${escapeHtml(jobNum)}</div>
                    </div>
                `;
            }
            
            if (releaseNum) {
                infoHTML += `
                    <div class="info-item">
                        <div class="info-label">Release Number</div>
                        <div class="info-value">${escapeHtml(releaseNum)}</div>
                    </div>
                `;
            }
            
            document.getElementById('content').innerHTML = `
                <div class="header">
                    <div class="company">SAI Advanced Power Solutions</div>
                    <h1>Skid Parts List</h1>
                </div>

                <div class="action-bar">
                    <button class="action-btn" onclick="printPage()">Print Page</button>
                    <button class="action-btn secondary" onclick="copyCSV()">Copy Info as CSV</button>
                    <div class="copy-status" id="copyStatus"></div>
                </div>

                <div class="skid-id">
                    <div class="skid-id-value">${escapeHtml(skidId)}</div>
                </div>

                <div class="info-section">
                    <div class="info-grid">
                        ${infoHTML}
                    </div>
                </div>

                <div class="parts-section">
                    <div class="parts-header">
                        <div class="parts-title">Parts List</div>
                        <div class="parts-count">${parts.length} items</div>
                    </div>
                    <div class="parts-list">
                        ${partsHTML || '<div class="part-item"><div class="part-details"><div class="part-name">No parts listed</div></div></div>'}
                    </div>
                </div>

                <div class="footer">
                    <div class="footer-text">Scanned from QR Code • SAI Advanced Power Solutions</div>
                </div>
            `;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const data = decodeData();
            if (data) {
                renderSkidInfo(data);
            }
        });
    </script>
</body>
</html>
